###############################################################################
# Agent Boshi — Docker Compose (Ollama Server)
# Powered by Hermes Agent + Ollama
#
# This runs Ollama in Docker with GPU support. Hermes Agent runs natively
# on your host and connects to this Ollama instance.
#
# Usage:
#   docker compose up -d              # Start Ollama
#   docker compose logs -f ollama     # Watch logs
#   docker compose down               # Stop everything
#
# Then run the setup script or connect Hermes:
#   ./setup.sh --ollama-url http://localhost:11434
#   hermes config set model.base_url http://localhost:11434/v1
###############################################################################

services:
  # ── Ollama: Local LLM Server ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: boshi-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Model Loader: Pulls the selected model on first run ───────
  # Set BOSHI_MODEL env var to your chosen model before starting.
  # Defaults to qwen2.5-coder:7b (tier 2).
  ollama-init:
    image: ollama/ollama:latest
    container_name: boshi-ollama-init
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_HOST=ollama:11434
      - BOSHI_MODEL=${BOSHI_MODEL:-qwen2.5-coder:7b}
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to start...'
        until curl -sf http://ollama:11434/api/tags > /dev/null 2>&1; do
          sleep 2
        done
        echo \"Pulling $${BOSHI_MODEL} ...\"
        curl -sf http://ollama:11434/api/pull -d \"{\\\"name\\\":\\\"$${BOSHI_MODEL}\\\"}\" | head -c 0
        echo ''
        echo 'Model ready! Agent Boshi is powered up.'
      "
    restart: "no"

volumes:
  ollama-models:
    name: boshi-ollama-models
